<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patronus Charm</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="search-header">
            <div class="top-bar">
                <button id="darkToggle" class="dark-toggle">Dark Mode</button>
            </div>
            <h1 class="logo">Patronus <span class="logo-accent">Charm</span></h1>
            <p class="tagline">Fast. Smart. Yours.</p>

            <div class="search-box-wrapper">
                <div class="search-box">
                    <input type="text" id="searchInput" class="search-input" placeholder="Enter your search query..." autocomplete="off">
                    <button id="searchBtn" class="search-button">Search</button>
                </div>
                <div id="suggestions" class="suggestions" style="display:none;"></div>
            </div>
        </div>

        <div class="content">
            <div id="searchMeta" class="search-meta" style="display:none;"></div>

            <div id="resultsContainer" class="results-container">
                <div id="emptyState" class="empty-state">
                    <p>Enter a search query to get started</p>
                </div>
                <div id="loadingState" class="loading-state" style="display:none;">
                    <div class="spinner"></div>
                    <p>Searching...</p>
                </div>
                <div id="errorState" class="error-state" style="display:none;">
                    <p id="errorMessage"></p>
                </div>
                <div id="resultsList" class="results-list"></div>
            </div>

            <div id="paginationContainer" class="pagination-container" style="display:none;">
                <button id="prevBtn" class="pagination-btn">Previous</button>
                <span id="pageInfo" class="page-info"></span>
                <button id="nextBtn" class="pagination-btn">Next</button>
            </div>
        </div>

        <footer class="footer">
            <p class="footer-powered">Powered by APT Search Engine</p>
            <div class="footer-author">
                <span>Built by <strong>HossamElden Mohamed</strong></span>
                <span class="footer-divider"></span>
                <div class="footer-links">
                    <a href="https://github.com/hossamelden202" target="_blank" rel="noopener noreferrer">

                        GitHub

                    <span class="footer-sep">·</span>

                </div>
            </div>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
