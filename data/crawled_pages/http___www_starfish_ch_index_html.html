   &lt;body&gt; &lt;h1&gt;&lt;font color="#003399"&gt;Starfish shows you &lt;br&gt; the secret life in the coral reefs&lt;/font&gt;&lt;/h1&gt; &lt;/div&gt; &lt;a href="Register.html"&gt;Register&lt;/a&gt; &lt;p align="center"&gt;The Starfish &lt;a href="Fotos.html"&gt;collection&lt;/a&gt; with over eight thousand underwater photos of &lt;a href="collection/index.html"&gt;fishes&lt;/a&gt; and &lt;a href="c-invertebrates/index.html"&gt;invertebrates&lt;/a&gt;, &lt;a href="collection/reptiles.html"&gt;reptiles&lt;/a&gt; and marine &lt;a href="c-invertebrates/plants.html"&gt;plants&lt;/a&gt; - take a look! &lt;/p&gt; &lt;h3 align="center"&gt; Click here for the &lt;a href="register/index.html"&gt;FISH-INDEX&lt;/a&gt; (over 700 species of fishes) and &lt;a href="register-i/index.html"&gt;INDEX of INVERTEBRATES&lt;/a&gt; - Index &lt;a href="register-i/molluscs.html"&gt;Molluscs&lt;/a&gt; / &lt;a href="register-i/crustaceans.html"&gt;Crustaceans&lt;/a&gt; / &lt;a href="register-i/cnidarians.html"&gt;Cnidarians&lt;/a&gt; / &lt;a href="register-i/echinoderms.html"&gt;Echinoderms&lt;/a&gt;&lt;/h3&gt; &lt;p align="center"&gt;&lt;a href="http://www.starfish.ch/Links.html"&gt;Links&lt;/a&gt; to other sites in the internet about marine life &lt;/p&gt; &lt;p align="center"&gt;Want to learn more about &lt;a href="reef/index.html"&gt;marine biology&lt;/a&gt;? Special texts and photos about &lt;a href="reef/scorpionfish.html"&gt;scorpionfishes&lt;/a&gt;, &lt;a href="reef/marine-turtles.html"&gt;turtles&lt;/a&gt;, &lt;a href="reef/shark.html"&gt;sharks&lt;/a&gt;, &lt;a href="reef/anemonefish.html"&gt;anemone fishes&lt;/a&gt;, &lt;a href="reef/sea-snakes.html"&gt;sea snakes&lt;/a&gt;, &lt;a href="reef/echinoderms.html"&gt;echinoderms&lt;/a&gt;, &lt;a href="reef/seaslugs.html"&gt;nudibranchs&lt;/a&gt; and &lt;a href="reef/seahorse.html"&gt;seahorses&lt;/a&gt;.&lt;/p&gt; &lt;p align="center"&gt;&lt;a href="http://www.frogfish.ch/frogfish.html"&gt;Zubi's Frogfish pages&lt;/a&gt; with over 1300 photos, information about the 48 (52?) frogfish species, behavior, habitat, mimicry, distribution. New website (2008).&lt;/p&gt; &lt;h2 align="center"&gt;&lt;font color="#003399"&gt;Zubi's wetpage&lt;/font&gt;&lt;/h2&gt; &lt;p align="center"&gt;Links for &lt;a href="http://www.starfish.ch/tauchen/index.html"&gt;divers&lt;/a&gt;&lt;/p&gt; &lt;p align="center"&gt;Go scuba diving with starfish in &lt;a href="http://www.starfish.ch/dive/index.html"&gt;Asia&lt;/a&gt; (&lt;a href="dive/Malaysia.html"&gt;Malaysia&lt;/a&gt;, &lt;a href="dive/Philippines.html"&gt;Philippines&lt;/a&gt;, &lt;a href="dive/Indonesia.html"&gt;Indonesia&lt;/a&gt;, &lt;a href="dive/Burma.html"&gt;Thailand and Burma&lt;/a&gt;). With a lot of photographs: &lt;a href="scubadiving/Galapagos.html"&gt;Galapagos islands&lt;/a&gt;, &lt;a href="dive/Oman.html"&gt;Oman&lt;/a&gt;&lt;/p&gt; &lt;p align="center"&gt;Each &lt;a href="http://www.starfish.ch/dive/index.html"&gt;travelog&lt;/a&gt; with a description and maps of the dive sites &lt;/p&gt; &lt;p align="center"&gt;My other websites: &lt;a href="http://www.frogfish.ch/" target="_blank"&gt;www.frogfish.ch&lt;/a&gt; / &lt;a href="http://www.critter.ch/" target="_blank"&gt;www.critter.ch&lt;/a&gt;&lt;/p&gt; &lt;div&gt; &lt;h1 align="center"&gt;&lt;font color="#003399"&gt;Starfish zeigt Euch das&lt;br&gt; geheimnisvolle Leben im Korallenriff &lt;/font&gt;&lt;/h1&gt; &lt;h2 align="center"&gt;&lt;font color="#003399"&gt;Zubi's Wetpage:&lt;/font&gt;&lt;/h2&gt; &lt;/div&gt; &lt;p align="center"&gt;Die Starfish &lt;a href="http://www.starfish.ch/Fotos.html"&gt;Unterwasser - Fotosammlung&lt;/a&gt; mit &amp;uuml;ber achttausend Fotos von &lt;a href="collection/index.html"&gt;Fischen&lt;/a&gt;, &lt;a href="c-invertebrates/index.html"&gt;Wirbellosen&lt;/a&gt; (&lt;a href="c-invertebrates/molluscs.html"&gt;Weichtiere&lt;/a&gt;, &lt;a href="c-invertebrates/nesseltiere.html"&gt;Nesseltieren&lt;/a&gt;, &lt;a href="c-invertebrates/echinoderms.html"&gt;Stachelh&amp;auml;uter&lt;/a&gt;, &lt;a href="c-invertebrates/crustaceans.html"&gt;Gliederf&amp;uuml;sser&lt;/a&gt; etc.), &lt;a href="collection/reptiles.html"&gt;Reptilien&lt;/a&gt; und marinen &lt;a href="c-invertebrates/plants.html"&gt;Pflanzen&lt;/a&gt; - schau es Dir an! &lt;/p&gt; &lt;h3 align="center"&gt;Klicke hier f&amp;uuml;r den ausf&amp;uuml;hrlichen &lt;a href="register/index.html"&gt;FISCH-INDEX&lt;/a&gt; (&amp;uuml;ber 700 Fischarten) und &lt;a href="register-i/index.html"&gt;INDEX der WIRBELLOSEN&lt;/a&gt; - Index &lt;a href="register-i/molluscs.html"&gt;Weichtiere&lt;/a&gt; / &lt;a href="register-i/crustaceans.html"&gt;Krebstiere&lt;/a&gt; / &lt;a href="register-i/cnidarians.html"&gt;Nesseltiere&lt;/a&gt; / &lt;a href="register-i/echinoderms.html"&gt;Stachelh&amp;auml;uter&lt;/a&gt;&lt;/h3&gt; &lt;p align="center"&gt;&lt;a href="http://www.starfish.ch/Korallenriff/index.html"&gt;Meeresbiologie&lt;/a&gt;: Verhalten, Merkmale, Vorkommen von marinen Tieren und Pflanzen - Texte und Illustrationen&lt;/p&gt; &lt;p align="center"&gt;&lt;a href="Korallenriff/Korallenriff.html"&gt;&amp;Ouml;kologie&lt;/a&gt;: Das Korallenriff in &lt;a href="http://www.starfish.ch/Korallenriff/Gefaehrdung.html"&gt;Gefahr&lt;/a&gt;, &lt;a href="Korallenriff/Hotspots.html"&gt;Hotspots&lt;/a&gt;&lt;/p&gt; &lt;p align="center"&gt;Grosse &lt;a href="http://www.starfish.ch/Links.html"&gt;Linksammlung&lt;/a&gt; zu den marinen Tieren &lt;/p&gt; &lt;div align="center"&gt;&lt;a href="http://www.frogfish.ch/anglerfisch.html"&gt;Zubi's Anglerfisch Seiten&lt;/a&gt; zu den 48 (52?) Anglerfisch-Arten, ihr Aussehen, Verhalten (Angeltechniken, Mimikry), Verbreitung und Vorkommen. Mit über 1300 Fotos. 2008 neu &amp;uuml;berarbeitet.&lt;/div&gt; &lt;h2 align="center"&gt;&lt;font color="#003399"&gt;und für TaucherInnen&lt;/font&gt;&lt;/h2&gt; &lt;p align="center"&gt;Tauchpl&amp;auml;tze in &lt;a href="tauchen/Bali.html"&gt;Bali&lt;/a&gt; sowie in &lt;a href="tauchen/Bunaken.html"&gt;Bunaken&lt;/a&gt;, &lt;a href="tauchen/Bangka.html"&gt;Bangka&lt;/a&gt;, &lt;a href="tauchen/Manado.html"&gt;Manado&lt;/a&gt; und &lt;a href="tauchen/Lembeh.html"&gt;Lembeh&lt;/a&gt; (Sulawesi, Indonesien) auf Deutsch. &lt;a href="Korallenriff/Tauchregeln.html"&gt;Tauchregeln&lt;/a&gt;.&lt;/p&gt; &lt;p align="center"&gt;&lt;a href="http://www.starfish.ch/dive/index.html"&gt;Reiseberichte&lt;/a&gt; von Starfish auf Englisch immer mit einer Tauchplatzbeschreibung, Karten und Reiseinformationen von &lt;a href="http://www.starfish.ch/dive/index.html"&gt;Asien&lt;/a&gt; (&lt;a href="dive/Malaysia.html"&gt;Malaysien&lt;/a&gt;, &lt;a href="dive/Philippines.html"&gt;Philippinen&lt;/a&gt;, &lt;a href="dive/Indonesia.html"&gt;Indonesien&lt;/a&gt;, &lt;a href="dive/Burma.html"&gt;Thailand und Burma&lt;/a&gt;), &lt;a href="scubadiving/Galapagos.html"&gt;Galapagos&lt;/a&gt;, &lt;a href="dive/Oman.html"&gt;Oman&lt;/a&gt;&lt;/p&gt; &lt;p align="center"&gt;This website uses Cookies. If you don't agree, please change to another website&lt;br&gt; Diese Webseite verwendet Cookies - falls Du damit nicht einverstanden bist, bitte wegklicken&lt;/p&gt; &lt;div align="center"&gt; &lt;/body&gt;
