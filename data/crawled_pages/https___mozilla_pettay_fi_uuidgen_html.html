<!doctype html>
<html>
 <head>
  <title>uuidgen</title>
  <script>
    function run() {
      let uuid = crypto.randomUUID();
      let ar = uuid.split("-");
      let cppstr = "{ 0x" + ar[0] + ", 0x" + ar[1] + ", 0x" + ar[2] + ", \\\n" +
                "  { 0x" + ar[3].substring(0, 2) + ", 0x" + ar[3].substring(2, 4) +
                ", 0x" + ar[4].substring(0, 2) + ", 0x" + ar[4].substring(2, 4) +
                ", 0x" + ar[4].substring(4, 6) + ", 0x" + ar[4].substring(6, 8) +
                ", 0x" + ar[4].substring(8, 10) + ", 0x" + ar[4].substring(10, 12) + " } }";
      document.getElementsByTagName("pre")[0].textContent = uuid + "\n\n" + cppstr;
    }
    </script>
 </head>
 <body onload="run()">
  <pre>  </pre>
 </body>
</html>
