 <body>
  <div id="map" style="width: 800px; height: 600px"></div>
  <script type="text/javascript">
    //<![CDATA[
    
    var map = new GMap(document.getElementById("map"));
    map.addControl(new GLargeMapControl());
    map.addControl(new GMapTypeControl());
    map.centerAndZoom(new GPoint(-122.071922,45.590256), 4);

// Create a marker whose info window displays the given number.
function createMarker(point, link, hikeTitle) {
  var marker = new GMarker(point);

  // Show this marker's index in the info window when it is clicked.
  	var html ="<a href=" + link + "><b>" + hikeTitle + "</b></a><br>"
  GEvent.addListener(marker, 'click', function() {
	marker.openInfoWindowHtml(html);
  });

  return marker;
}

var marker = createMarker(new GPoint(-122.071922,45.590256), "TripleFalls.html", "Triple Falls");
  map.addOverlay(marker);

    //]]>
    </script>
