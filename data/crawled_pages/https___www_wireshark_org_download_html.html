        <h2 style="color: #fff; background-color: #0052ff;">Not What You're Looking For?</h2>
       </div>
       <h3>Older Releases</h3>
       <p>All present and past releases can be found in our <a href="#spelunking">our download area</a>.</p>
       <h3>Installation Notes</h3>
       <p>For a complete list of system requirements and supported platforms, please consult <a href="/docs/wsug_html_chunked/ChIntroPlatforms.html">the User's Guide</a>.</p>
       <p>Information about each release can be found in <a href="/docs/relnotes/">the release notes</a>.</p>
       <p>Each Windows package comes with the latest stable release of Npcap, which is required for live packet capture. If needed you can download separately from the <a href="https://npcap.com/">Npcap</a> web site.</p>
       <h3>Live on the Bleeding Edge</h3>
       <p>You can download source code packages and Windows installers which are automatically created each time code is checked into the <a href="https://gitlab.com/wireshark/wireshark/">source code repository</a>. These packages are available in the <a href="/download/automated/">automated build section</a> of our download area.</p>
       <h3 id="spelunking">Go Spelunking</h3>
       <p>You can explore the download areas of the main site and mirrors below. Past releases can be found by browsing the <i>all-versions</i> directories under each platform directory.</p>

       <h3>Stay Current</h3>
       <p>You can stay informed about new Wireshark releases by subscribing to the <a href="/lists">wireshark-announce mailing list</a>. We also provide a <a href="xml/wireshark-pad.xml">PAD file</a> to make automated checking easier.</p>
       <h3>Verify Downloads</h3>
       <p>File hashes for the current release can be found in the <a href="/download/SIGNATURES-4.4.6.txt">signatures file</a>. It is signed with <a href="/download/gerald_at_wireshark_dot_org.gpg">key id 0xE6FEAEEA</a>. Prior to April 2016 downloads were signed with <a href="/download/gpg_transition_statement_2016.txt">key id 0x21F2949A</a>.</p>
       <h3>Stay Legal</h3>
       <p>Wireshark is subject to<a href="/export.html"> U.S. export regulations</a>. Take heed. Consult a lawyer if you have any questions.</p>
