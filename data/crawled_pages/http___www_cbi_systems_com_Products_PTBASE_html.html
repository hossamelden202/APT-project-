 <body class="login">
  <div class="container custom-container">

     <div class="box row">
      <div class="email-password-area col-xs-12 large col-sm-12">

        <div class="ms4-logo">
         <img src="public/img/CBISystemsLogo-md.png">
        </div><span>Welcome! Please log in. </span>
       </div>
       <form method="post" role="form" action="/v1/login?next=/" class="login-form form-horizontal">
        <input name="_csrf" type="hidden">
        <div class="form-group group-email">
         <label class="col-sm-4">Email</label>
         <div class="col-sm-8">
          <input autofocus="true" placeholder="Email" required name="login" type="text" value="" tabindex="1" class="form-control">
         </div>
        </div>
        <div class="form-group group-password">
         <label class="col-sm-4">Password</label>
         <div class="col-sm-8">
          <input placeholder="Password" required type="password" name="password" , tabindex="2" class="form-control">
         </div>
        </div>
        <div class="form-group group-agreement">
         <div class="col-sm-4"></div>
         <div class="col-sm-8">
          <div class="checkbox">
           <label for="agree-cb"> <input id="agree-cb" type="checkbox" onchange="$(&quot;button.login&quot;).prop(&quot;disabled&quot;, !this.checked)" tabindex="3">I accept the <a type="button" data-toggle="modal" data-target="#agreement-modal">End User Licensing Agreement</a></label>
          </div>
         </div>
         <div id="agreement-modal" role="dialog" data-backdrop="static" class="modal fade">
          <div role="document" class="modal-dialog modal-lg">
           <div class="modal-content">
            <div class="modal-header">
             <button type="button" data-dismiss="modal" arial-label="Close" class="close"><span aria-hidden="true">×</span></button>
             <h4 class="modal-title">End User Licensing Agreement</h4>
            </div>
            <div class="modal-body">
             <iframe src="public/EULA.html" frameborder="0" height="400px" width="100%" allowfullscreen></iframe>
            </div>
            <div class="modal-footer">
             <a href="public/EULA.html" target="_blank" class="btn btn-default">Open in new window</a>
             <button type="button" data-dismiss="modal" onclick="$(&quot;#agree-cb&quot;).prop(&quot;checked&quot;, true).change()" class="btn btn-success">I ACCEPT</button>
            </div>
           </div>
          </div>
         </div>
        </div>
        <div>
         <button type="submit" disabled class="login btn btn-login btn-sp-green">Log In</button>
        </div>
       </form>
      </div>
     </div>
     <div class="row">
      <div class="col-sm-12 bottom-links">
